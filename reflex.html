<!DOCTYPE html>
<html lang="en">
<head>
  <title>reflexgame</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>  

  </head>
<body>

  <h2>Hunter Canole reflexes</h2>
  <div id = "target">
    Your time
  </div>
  <div id = "counter">
    Count
  </div>

  <button type="button" class="btn btn-primary" onclick="begintime()">
  GO
  </button>
  <button type="button" class="btn btn-primary" onclick="recordtime()">
  HALT
  </button>
  
  <script> 
  let halttime = 0
  function recordtime(){
    halttime = Date.now()
    console.log(halttime);
  }
  function begintime(){
    for(let i =0 ; i<=5 ; i++){
      setTimeout(function(){
        document.getElementById('counter').innerHTML= 5 - i;
      },
      i * 1000 );
    }
  setTimeout(function(){
        if(halttime==0){
          document.getElementById('target').innerHTML= "Not soon enough";
        }
        else{
          let targetTime = Date.now()
          let compute = targetTime - halttime
          document.getElementById('target').innerHTML= "Time was " + compute ; 
        }
      }, 5000)
}
  function buttonPress1() {
    setTimeout(function(){
      document.getElementById('target').style.color = "red"
    }, 3000)
  }

  function buttonPress2() {
    setTimeout(()=>{
      document.getElementById('target').style.color = "red"
    }, 3000)
  }
  </script>

</body>
</html>
