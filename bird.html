<script> 
 let ids = [];
for (let i = 0; i < 35; i++) {
    ids.push(i.toString());
}
var score = 0
var  locationsVisited = 0
var lastLocation = 0
var statueLocation = 19
var toucanLocation = 14
var  lorikeetLocation = [3, 25]
var buntingLocation = [2, 5, 11, 20, 21]
var gameOver = false

 function check(position){
  if (gameOver == true){
    return;
  }
   let x  = ids[position]
  if ( position == statueLocation){
    document.getElementById(x).querySelector("img").src = "statue.webp";
    document.getElementById(x).onclick = null
    score -=3
    gameOver = true
  }
    if (position ==  toucanLocation){
    document.getElementById(x).querySelector("img").src = "toucan.jpeg";
    document.getElementById(x).onclick = null
    score +=5
  }
  if (lorikeetLocation.includes(position)){
    document.getElementById(x).querySelector("img").src = "Lorikeet.jpg";
    document.getElementById(x).onclick = null
    score +=3
  }
   if (buntingLocation.includes(position)){
    document.getElementById(x).querySelector("img").src = "Bunting.jpg";
    document.getElementById(x).onclick = null;
    
    score +=1 
    
  }
  locationsVisited +=1
  lastLocation = position
  document.getElementById("locations").innerText = "Number of locations checked is " + locationsVisited;
    document.getElementById("score").innerText = "Score is " + score;

}


 function help(){
  col = lastLocation % 5 
  row = Math.floor(lastLocation / 7)
  
   let neighbors = [
        row * 7 + ((col - 1 + 7) % 7),
        row * 7 + ((col + 1) % 7),    
        ((row - 1 + 5) % 5) * 7 + col, 
        ((row + 1) % 5) * 7 + col     
    ];

  checknine = [
    lastLocation -1,
    lastLocation +1,
    lastLocation - 7,
    lastLocation + 7, 
    lastLocation - 6,
    lastLocation - 8,
    lastLocation +6,
    lastLocation +8,
     lastLocation
  ]
  if (neighbors.some(n => buntingLocation.includes(n))) {
        helpResult = "Cheep";
    } else if (checknine.includes(toucanLocation)) {
    helpResult = "Caw";
  } else if (checknine.includes(statueLocation)) {
      helpResult = "Thrum";
    } else{
  helpResult = "silence" ; 
}
document.getElementById("helpreport").innerText = helpResult;
 }
  </script>
